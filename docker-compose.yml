services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
      DATA_DIR: /data
    volumes:
      - routine-data:/data
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file:
      - .env
    depends_on:
      - web
    restart: unless-stopped

volumes:
  routine-data:
