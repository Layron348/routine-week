services:
  - type: web
    name: routine-week-web
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PORT
        value: "8000"
      - key: BOT_TOKEN
        sync: false
      - key: MINI_APP_URL
        sync: false

  - type: worker
    name: routine-week-bot
    runtime: docker
    dockerfilePath: ./Dockerfile.bot
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MINI_APP_URL
        sync: false
