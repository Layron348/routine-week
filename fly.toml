# fly.toml app configuration file generated for routine-week on 2026-06-13T17:21:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'routine-week'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  PORT = '8080'

[[mounts]]
  source = 'routine_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
